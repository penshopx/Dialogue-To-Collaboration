kind = "web"
previewPath = "/"
title = "Collaboration Builder"
version = "1.0.0"
id = "artifacts/collaboration-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23244

[services.development]
run = "pnpm --filter @workspace/collaboration-builder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/collaboration-builder", "run", "build" ]
publicDir = "artifacts/collaboration-builder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23244"
BASE_PATH = "/"
