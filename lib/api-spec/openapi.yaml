    DecisionLogInput:
      type: object
      required: [aktor, tipeAksi, ringkasan]
      properties:
        stageId:
          type: integer
        aktor:
          type: string
        tipeAksi:
          type: string
        ringkasan:
          type: string
        detail:
          type: object

    # ── Stage Completion Result ───────────────────────────────────────────────
    StageCompletionResult:
      type: object
      required: [completedStageId, nextStageId, isGate, workroomStatus]
      properties:
        completedStageId:
          type: integer
        nextStageId:
          type: ["integer", "null"]
        isGate:
          type: boolean
        workroomStatus:
          type: string
        message:
          type: string

    # ── Compiled Pack ─────────────────────────────────────────────────────────
    CompiledPack:
      type: object
      required: [workroomId, deliverableCount, packId]
      properties:
        workroomId:
          type: integer
        deliverableCount:
          type: integer
        packId:
          type: integer
        message:
          type: string

    # ── Early Warning ─────────────────────────────────────────────────────────
    EarlyWarning:
      type: object
      required: [workroomId, workroomName, warningType, message, severity]
      properties:
        workroomId:
          type: integer
        workroomName:
          type: string
        stageId:
          type: ["integer", "null"]
        stageName:
          type: ["string", "null"]
        warningType:
          type: string
          description: "gate_stuck | overdue | no_activity"
        message:
          type: string
        severity:
          type: string
          description: "critical | warning | info"
        hoursElapsed:
          type: ["number", "null"]
