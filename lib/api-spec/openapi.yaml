openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Collaboration Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: templates
  - name: workrooms
  - name: agents
  - name: tasks
  - name: stages
  - name: gates
  - name: activity
  - name: dashboard
  - name: knowledge
  - name: deliverables
  - name: brain
  - name: config

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Templates ──────────────────────────────────────────────────────────────
  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all workflow templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowTemplate"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a workflow template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTemplate"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a workflow template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTemplate"
        "404":
          description: Not found
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update a workflow template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTemplateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTemplate"
        "404":
          description: Not found
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete a workflow template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Agents ─────────────────────────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Workrooms ──────────────────────────────────────────────────────────────
  /workrooms:
    get:
      operationId: listWorkrooms
      tags: [workrooms]
      summary: List all workrooms
      responses:
        "200":
          description: List of workrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workroom"
    post:
      operationId: createWorkroom
      tags: [workrooms]
      summary: Create a workroom from a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workroom"

  /workrooms/{id}:
    get:
      operationId: getWorkroom
      tags: [workrooms]
      summary: Get a workroom with stages and tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workroom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomDetail"
        "404":
          description: Not found
    patch:
      operationId: updateWorkroom
      tags: [workrooms]
      summary: Update a workroom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workroom"
    delete:
      operationId: deleteWorkroom
      tags: [workrooms]
      summary: Delete a workroom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Workroom Stages ────────────────────────────────────────────────────────
  /workrooms/{workroomId}/stages:
    get:
      operationId: listWorkroomStages
      tags: [stages]
      summary: List stages for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkroomStage"

  /workrooms/{workroomId}/stages/{stageId}:
    patch:
      operationId: updateWorkroomStage
      tags: [stages]
      summary: Update stage status (advance, approve gate, etc.)
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
        - name: stageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomStageUpdate"
      responses:
        "200":
          description: Updated stage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomStage"

  # ── Workroom Tasks ─────────────────────────────────────────────────────────
  /workrooms/{workroomId}/tasks:
    get:
      operationId: listWorkroomTasks
      tags: [tasks]
      summary: List tasks for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkroomTask"
    post:
      operationId: createWorkroomTask
      tags: [tasks]
      summary: Create a task in a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomTaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomTask"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomTaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomTask"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Stage Summary ─────────────────────────────────────────────────────────
  /workrooms/{workroomId}/stages/{stageId}/summary:
    get:
      operationId: getStageSummary
      tags: [stages]
      summary: Get structured summary for a stage
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
        - name: stageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageSummary"
        "404":
          description: Not found
    put:
      operationId: upsertStageSummary
      tags: [stages]
      summary: Create or update stage summary
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
        - name: stageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageSummaryInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageSummary"

  # ── Workroom Metrics ─────────────────────────────────────────────────────
  /workrooms/{workroomId}/metrics:
    get:
      operationId: listWorkroomMetrics
      tags: [workrooms]
      summary: Get metrics for all stages of a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Metrics list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkroomMetrics"
    put:
      operationId: upsertWorkroomMetrics
      tags: [workrooms]
      summary: Create or update metrics for a stage
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomMetricsInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomMetrics"

  # ── Activity Log ──────────────────────────────────────────────────────────
  /workrooms/{workroomId}/activity:
    get:
      operationId: listWorkroomActivity
      tags: [activity]
      summary: Get activity log for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"
    post:
      operationId: addWorkroomActivity
      tags: [activity]
      summary: Add an activity entry
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEntry"

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-workrooms:
    get:
      operationId: getRecentWorkrooms
      tags: [dashboard]
      summary: Get recently updated workrooms
      responses:
        "200":
          description: Recent workrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workroom"

  # ── Insights ────────────────────────────────────────────────────────────────
  /insights:
    get:
      operationId: getInsights
      tags: [dashboard]
      summary: Get aggregated insights across all workrooms
      responses:
        "200":
          description: Insights data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsSummary"

  # ── Knowledge Base ──────────────────────────────────────────────────────────
  /workrooms/{workroomId}/knowledge:
    get:
      operationId: listKnowledgeItems
      tags: [knowledge]
      summary: List knowledge base items for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Knowledge base items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeItem"
    post:
      operationId: createKnowledgeItem
      tags: [knowledge]
      summary: Create a knowledge base item
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeItem"

  /knowledge/{id}:
    patch:
      operationId: updateKnowledgeItem
      tags: [knowledge]
      summary: Update a knowledge item
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeItem"
    delete:
      operationId: deleteKnowledgeItem
      tags: [knowledge]
      summary: Delete a knowledge item
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Deliverables ─────────────────────────────────────────────────────────────
  /workrooms/{workroomId}/deliverables:
    get:
      operationId: listDeliverables
      tags: [deliverables]
      summary: List deliverables for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deliverables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deliverable"
    post:
      operationId: createDeliverable
      tags: [deliverables]
      summary: Create a deliverable
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverableInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deliverable"

  /deliverables/{id}:
    patch:
      operationId: updateDeliverable
      tags: [deliverables]
      summary: Update a deliverable
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverableUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deliverable"
    delete:
      operationId: deleteDeliverable
      tags: [deliverables]
      summary: Delete a deliverable
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Project Brain ─────────────────────────────────────────────────────────────
  /workrooms/{workroomId}/brain:
    get:
      operationId: getWorkroomBrain
      tags: [brain]
      summary: Get project brain for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Project brain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomBrain"
    patch:
      operationId: updateWorkroomBrain
      tags: [brain]
      summary: Update project brain
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomBrainUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomBrain"

  # ── Workroom AI Summary ───────────────────────────────────────────────────────
  /workrooms/{workroomId}/summarize:
    post:
      operationId: summarizeWorkroom
      tags: [workrooms]
      summary: Generate an AI executive summary for a workroom (SSE streaming)
      description: >
        Streams an AI-generated executive summary (progress, decisions, next steps)
        as Server-Sent Events. Each event is `data: {"content":"..."}` and
        the final event is `data: {"done":true}`.
      parameters:
        - name: workroomId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of summary chunks
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Workroom not found

  # ── Workroom Config (Persona + Policies) ─────────────────────────────────────
  /workrooms/{workroomId}/config:
    get:
      operationId: getWorkroomConfig
      tags: [config]
      summary: Get workroom AI configuration
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Workroom config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomConfig"
    patch:
      operationId: updateWorkroomConfig
      tags: [config]
      summary: Update workroom AI configuration
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkroomConfigUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkroomConfig"

  /workrooms/{workroomId}/stages/{stageId}/exit-criteria:
    get:
      operationId: listStageExitCriteria
      tags: [exit-criteria]
      summary: List exit criteria for a stage
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
        - name: stageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of exit criteria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StageExitCriteria"
    post:
      operationId: createStageExitCriteria
      tags: [exit-criteria]
      summary: Create an exit criterion for a stage
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
        - name: stageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageExitCriteriaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageExitCriteria"

  /workrooms/{workroomId}/stages/{stageId}/exit-criteria/{criteriaId}:
    patch:
      operationId: updateStageExitCriteria
      tags: [exit-criteria]
      summary: Update (toggle) an exit criterion
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
        - name: stageId
          in: path
          required: true
          schema: { type: integer }
        - name: criteriaId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageExitCriteriaUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageExitCriteria"
    delete:
      operationId: deleteStageExitCriteria
      tags: [exit-criteria]
      summary: Delete an exit criterion
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
        - name: stageId
          in: path
          required: true
          schema: { type: integer }
        - name: criteriaId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /templates/{id}/stages:
    get:
      operationId: listTemplateStages
      tags: [templates]
      summary: Get stages defined for a template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Template stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateStage"

  /templates/{id}/roles:
    get:
      operationId: listTemplateRoles
      tags: [templates]
      summary: Get roles defined for a template
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Template roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateRole"

  # ── Collaboration Roles ───────────────────────────────────────────────────
  /workrooms/{workroomId}/roles:
    get:
      operationId: listCollaborationRoles
      tags: [workrooms]
      summary: List roles assigned to a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of collaboration roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CollaborationRole"
    post:
      operationId: addCollaborationRole
      tags: [workrooms]
      summary: Add a role to a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollaborationRoleInput"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollaborationRole"

  /workrooms/{workroomId}/roles/{roleId}:
    delete:
      operationId: removeCollaborationRole
      tags: [workrooms]
      summary: Remove a role from a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
        - name: roleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── Decision Logs ─────────────────────────────────────────────────────────
  /workrooms/{workroomId}/decision-logs:
    get:
      operationId: listDecisionLogs
      tags: [workrooms]
      summary: List decision logs for a workroom
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of decision logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DecisionLog"
    post:
      operationId: addDecisionLog
      tags: [workrooms]
      summary: Add a decision log entry
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionLogInput"
      responses:
        "201":
          description: Created log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionLog"

  # ── Stage Completion (processStageCompletion) ─────────────────────────────
  /workrooms/{workroomId}/stages/{stageId}/complete:
    post:
      operationId: completeStage
      tags: [stages]
      summary: Mark a stage as complete and advance to next
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
        - name: stageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                aktor:
                  type: string
      responses:
        "200":
          description: Stage completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageCompletionResult"

  # ── Pack Compiler ─────────────────────────────────────────────────────────
  /workrooms/{workroomId}/compile-pack:
    post:
      operationId: compileFinalPack
      tags: [deliverables]
      summary: Compile all approved deliverables into a final pack
      parameters:
        - name: workroomId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Compiled pack info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompiledPack"

  # ── Dashboard Early Warnings ──────────────────────────────────────────────
  /dashboard/early-warnings:
    get:
      operationId: getEarlyWarnings
      tags: [dashboard]
      summary: Get early warnings — gates stuck or overdue workrooms
      responses:
        "200":
          description: Early warnings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EarlyWarning"

